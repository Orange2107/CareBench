# InfoReg Configuration
# Information Regularization for Multimodal Learning

# Model settings
model_name: inforeg
hidden_size: 256

# Encoder settings
ehr_encoder: transformer  # Options: 'lstm', 'transformer'
ehr_num_layers: 1          # Number of LSTM layers
ehr_bidirectional: true    # Bidirectional LSTM

# Transformer specific (when ehr_encoder='transformer')
ehr_n_head: 4              # Number of attention heads
ehr_n_layers: 1            # Number of transformer layers
ehr_dropout: 0.2           # Dropout rate for EHR encoder

cxr_encoder: resnet50  # Options: 'resnet50', 'hf_chexpert_vit'
hf_model_id: codewithdark/vit-chest-xray  # Used when cxr_encoder='hf_chexpert_vit'
freeze_vit: true
bias_tune: false
partial_layers: 0
pretrained: true

# InfoReg specific parameters
# FIX: Adjusted based on proper understanding of InfoReg mechanism
# For 50 epochs training: info_history=10 means epochs 0-10 always apply InfoReg,
# epochs 11-49 adaptively apply based on k_value
info_k_threshold: 0.05      # Threshold for k value to apply regulation
info_ehr_scale: 0.95         # Scale for EHR gradient reduction (higher = stronger slowdown)
info_cxr_scale: 0.10         # Scale for CXR gradient reduction (balanced with EHR)
info_history: 5            # History length for FIM tracking (10-11 epochs = ~20-22% of training)

# Training settings
lr: 0.0001
patience: 10  # For ReduceLROnPlateau
batch_size: 16
epochs: 50

# Task settings
task: phenotype  # Options: 'phenotype', 'mortality', 'los'
num_classes: 25  # 25 for phenotype, 1 for mortality, 7 for los
input_dim: 49    # Input dimension for EHR data
use_label_weights: false

# Fairness evaluation configuration
compute_fairness: True
fairness_attributes: ["admission_type", "age", "gender", "race"]
fairness_age_bins: [0, 40, 60, 80, .inf]  # Age ranges: 0-40, 40-60, 60-80, 80+
fairness_intersectional: True
