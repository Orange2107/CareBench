# ResNet training configuration for mortality task
# Parameters extracted from scripts/train_resnet.sh

# Experiment metadata
experiment_name: "resnet_mortality"
description: "ResNet50 model training for mortality task on fold 1"

# Model configuration
model: resnet
task: mortality
fold: 1

# Training parameters
batch_size: 16
lr: 0.0001
patience: 10
epochs: 50
gpu: [0]

# Data configuration
matched: false
use_demographics: false
cross_eval: null

# ResNet specific parameters
hidden_size: 256
dropout: 0.2
pretrained: true

# Task-specific parameters
num_classes: 1
input_dim: 49

# Seeds configuration
seeds: [42]

# Additional training options
save_checkpoint: true
dev_run: false

# Fairness evaluation
compute_fairness: true
fairness_attributes: ['age', 'race', 'gender']
fairness_age_bins: [0, 40, 60, 80, .inf]
fairness_intersectional: true

# Predictions saving
save_predictions: true

