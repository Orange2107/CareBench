# Late Fusion training configuration for mortality task
# Parameters extracted from scripts/train_latefusion.sh

# Experiment metadata
experiment_name: "latefusion_mortality"
description: "Late Fusion model training for mortality task on fold 1"

# Model configuration
model: latefusion
task: mortality
fold: 1

# Training parameters
batch_size: 16
lr: 0.0001
patience: 10
epochs: 50
gpu: [0]

# Data configuration
matched: false
use_demographics: false
cross_eval: null

# Late Fusion specific parameters
ehr_encoder: transformer
cxr_encoder: resnet50  # set hf_chexpert_vit to use HF ViT
hf_model_id: codewithdark/vit-chest-xray
freeze_vit: true
bias_tune: false
partial_layers: 0
hidden_size: 256
ehr_dropout: 0.2
ehr_n_layers: 1
ehr_n_head: 4
pretrained: true
unimodal_loss: false

# Task-specific parameters
num_classes: 1
input_dim: 498

# Seeds configuration
seeds: [42]

# Additional training options
save_checkpoint: true
dev_run: false

# Fairness evaluation
compute_fairness: true
fairness_attributes: ['age', 'race', 'gender']
fairness_age_bins: [0, 40, 60, 80, .inf]
fairness_intersectional: true

# Predictions saving
save_predictions: true

