# UTDE training configuration for LOS task
# Parameters extracted from los_train_scripts/train_utde.sh

# Experiment metadata
experiment_name: "utde_los"
description: "UTDE model training for LOS task on fold 1"

# Model configuration
model: utde
task: los
fold: 1

# Training parameters
batch_size: 16
lr: 0.0001
patience: 10
epochs: 50
gpu: [0]

# Data configuration
matched: false
use_demographics: false
cross_eval: null

# UTDE specific parameters
ehr_encoder: transformer
cxr_encoder: resnet50
embed_dim: 256
embed_time: 64
num_heads: 4
tt_max: 500
cross_layers: 1
dropout: 0.2
pretrained: true
ehr_num_layers: 1
ehr_bidirectional: true
ehr_hidden_dim: 256
ehr_n_head: 4

# Task-specific parameters
num_classes: 7
input_dim: 49

# Seeds configuration
seeds: [42, 123, 1234]

# Additional training options
save_checkpoint: true
dev_run: false

# Fairness evaluation
compute_fairness: true
fairness_attributes: ['age', 'race', 'gender']
fairness_age_bins: [0, 40, 60, 80, .inf]
fairness_intersectional: true

# Predictions saving
save_predictions: true

