# AUG training configuration for los task on fold 1
# This config replaces the train_aug.sh script functionality

# Experiment metadata
experiment_name: "aug_los"
description: "AUG model training for los prediction on fold 1 with multiple seeds"

# Model configuration
model: aug
task: los
fold: 1

# Training parameters
batch_size: 160000000000000000000000
lr: 0.0001
patience: 10
epochs: 50
gpu: [3]  # GPU device number

# Data configuration
matched: true
use_demographics: false
cross_eval: null  # Set to "matched_to_full" or "full_to_matched" if needed

# AUG specific parameters
ehr_encoder: transformer    # Options: 'lstm', 'transformer'
cxr_encoder: resnet50       # Options: 'resnet50', 'swin_s', 'swin_t'
hidden_size: 256            # Hidden feature dimension for both modalities
ehr_dropout: 0.2            # Dropout rate for EHR encoder
ehr_n_head: 4               # Number of attention heads for transformer
ehr_n_layers: 1             # Number of transformer layers
ehr_num_layers: 1           # Number of LSTM layers (when ehr_encoder='lstm')
ehr_bidirectional: true     # Bidirectional LSTM (when ehr_encoder='lstm')
pretrained: true            # Use pretrained CXR encoder

# AUG-specific fusion parameters
aug_merge_alpha: 0.7989072160357569        # Fusion weight: pred = alpha*ehr + (1-alpha)*cxr
aug_lambda: 0.9836383867971505             # Target performance ratio (ehr_score / cxr_score = 1.0 for balance)
aug_margin: 0.02967079042591242            # Margin for triggering layer addition
aug_layer_check_interval: 10 # Check and add layers every N epochs
aug_classifier_hidden_dim: 256  # Hidden dimension for modality-specific classifiers

# Task-specific parameters
num_classes: 25
input_dim: 49

# Seeds configuration (including 42)
seeds: [42, 123, 1234]

# Additional training options
save_checkpoint: true
dev_run: false
num_workers: 4

# Label weight configuration
label_weight_method: balanced  # Options: 'balanced', 'inverse', 'sqrt_inverse', 'log_inverse'

# Fairness evaluation (optional)
compute_fairness: true
fairness_attributes: ['admission_type', 'age', 'race', 'gender']
fairness_age_bins: [0, 40, 60, 80, .inf]  # Age ranges: 0-40, 40-60, 60-80, 80+
fairness_intersectional: true

# Predictions saving
save_predictions: true
use_label_weights: false