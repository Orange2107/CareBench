model_name: lstm

# LSTM Model Params
hidden_size: 256
num_layers: 2
bidirectional: true
dropout: 0.2
input_dim: 24
num_classes: 25

# Training Config
task: phenotype
batch_size: 16
epochs: 50
patience: 10
lr: 0.0004

# Load / Resume Options
load_state: null
resume_from_checkpoint: null

# Data Config
data_pairs: ehr_only

# Logging & Saving
save: false
save_dir: checkpoints/lstm 

# Label Weight Configuration for Class Imbalance
use_label_weights: false  # Enable/disable label weights
label_weight_method: balanced  # Options: 'balanced', 'inverse', 'sqrt_inverse', 'log_inverse', 'custom'

# Fairness evaluation configuration
compute_fairness: True
fairness_attributes: ["admission_type", "age", "gender", "race"]
fairness_age_bins: [0, 40, 60, 80, .inf]  # Age ranges: 0-40, 40-60, 60-80, 80+
fairness_intersectional: True