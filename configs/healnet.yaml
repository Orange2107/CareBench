model_name: healnet
tracked_hparams: [depth, latent_channels, cross_heads, latent_heads, num_freq_bands, max_freq, hidden_size, ehr_input_mode, cxr_input_mode, ehr_encoder_type, cxr_encoder]

# -----------------------
# Model Architecture & Fusion Parameters
# -----------------------
n_modalities: 2              # Number of modalities (EHR and CXR)
depth: 3                  # Number of fusion layers
latent_channels: 256      # Number of latent tokens
latent_dim: 256          # Dimension of latent tokens
cross_heads: 4           # Number of cross-attention heads
latent_heads: 4          # Number of self-attention heads
cross_dim_head: 64       # Dimension of each cross-attention head
latent_dim_head: 64      # Dimension of each self-attention head
self_per_cross_attn: 1   # Self-attention layers per cross-attention
weight_tie_layers: true # Whether to share weights across layers
snn: true                # Whether to use self-normalizing networks
fourier_encode_data: true       # Whether to use Fourier positional encoding
num_freq_bands: 2               # Number of frequency bands
max_freq: 10.0                  # Maximum frequency for encoding
final_classifier_head: true     # Whether to add final classification head
attn_dropout: 0.2               # Dropout rate for attention layers
ff_dropout: 0.2                 # Dropout rate for feed-forward layers

# -----------------------
# Input/Output Dimensions
# -----------------------
use_phenotype9: true
input_dim: 49            # EHR dimension
hidden_size: 256        # Shared encoder hidden dimension from models/base/base_encoder.py
num_classes: 9           # Number of output classes

# -----------------------
# Modality Input Modes
# -----------------------
ehr_input_mode: encoded      # raw | encoded
cxr_input_mode: encoded       # raw | encoded

# EHR encoded path
ehr_encoder_type: transformer   # transformer | lstm
ehr_context_dim: 256
ehr_n_head: 4
ehr_n_layers: 1
ehr_dropout: 0.2
ehr_bidirectional: true

# CXR encoded path
cxr_encoder: hf_chexpert_vit     # resnet50 | hf_chexpert_vit | densenet121-imagenet | densenet121-res224-chex
cxr_context_dim: 256
hf_model_id: codewithdark/vit-chest-xray
freeze_vit: false
bias_tune: false
partial_layers: 0

# -----------------------
# Training Config
# -----------------------
mode: train
batch_size: 4
epochs: 50
patience: 10
lr: 0.0001
dropout: 0.2

data_pairs: paired_ehr_cxr    
pretrained: true              
matched: false                # Use full data by default
cross_eval: null

use_label_weights: false  # Enable/disable label weights
label_weight_method: balanced  # Options: 'balanced', 'inverse', 'sqrt_inverse', 'log_inverse', 'custom'

# Fairness evaluation configuration
compute_fairness: True
fairness_attributes: ['admission_type', 'age', 'gender', 'race']
fairness_age_bins: [0, 40, 60, 80, .inf]  # Age ranges: 0-40, 40-60, 60-80, 80+
fairness_intersectional: True

# -----------------------
# finetune parameters
# -----------------------
# depth: 1、2、3
# num_freq_bands: 1、2、4               # Number of frequency bands
# max_freq: 5、10.0   
