model_name: m3care

# -----------------------
# Task Configuration
# -----------------------
task: phenotype
num_classes: 25
input_dim: 498

# -----------------------
# Encoder Selection
# -----------------------
ehr_encoder: transformer    # lstm, transformer
cxr_encoder: resnet50      # resnet50
pretrained: true

# -----------------------
# EHR Encoder Parameters
# ----------------------- 
# LSTM specific
ehr_num_layers: 1
ehr_bidirectional: true

# Transformer specific
ehr_n_head: 4
ehr_n_layers: 1
ehr_dropout: 0.2
max_len: 500

# -----------------------
# M3Care Architecture
# -----------------------
hidden_dim: 256
dropout: 0.2
stab_reg_lambda: 0.1

# -----------------------
# Training Configuration
# -----------------------
lr: 0.0001
epochs: 50
batch_size: 16
patience: 10

use_label_weights: false  # Enable/disable label weights
label_weight_method: balanced  # Options: 'balanced', 'inverse', 'sqrt_inverse', 'log_inverse', 'custom'

# Fairness evaluation configuration
compute_fairness: True
fairness_attributes: ["admission_type", "age", "gender", "race"]
fairness_age_bins: [0, 40, 60, 80, .inf]  # Age ranges: 0-40, 40-60, 60-80, 80+
fairness_intersectional: True